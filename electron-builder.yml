appId: com.snedea.loov
productName: LOOV
copyright: Copyright 2025

directories:
  output: release

mac:
  category: public.app-category.games
  target:
    - dmg
    - zip
  darkModeSupport: true

dmg:
  title: LOOV
  artifactName: LOOV-${version}.${ext}

files:
  - electron/dist/**/*
  - frontend/dist/**/*
  - "!node_modules"
  - "!backend"
  - "!saves"
  - "!*.py"

extraResources:
  - from: .
    to: game
    filter:
      - "game_data.py"
      - "obsidian.py"
      - "brainbot.py"
      - "fantasy_translator.py"
      - "backend/**/*.py"
      - "demo_vault/"
